<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #212121;
            /* display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh; */
              height: 100vh;
    display: grid;
    place-items: center;
        }
        .center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            width: 500px;
            /* border: 1px solid #212121; */
            background-color: #cecece;
            border-radius: 20px;
            box-shadow: 8px 8px 15px #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .clock {
            font-size: 60px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="center">
        <h2>Time Now is:</h2>
        <div class="clock">
            <!-- 10:33 -->
        </div>
    </div>

    <script>
        const clock = document.querySelector('.clock')

        setInterval(function () {
        let date = new Date();
        // console.log(date.toLocaleTimeString());
        clock.innerHTML = date.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
