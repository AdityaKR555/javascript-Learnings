<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            background-color: #212121;
            display: grid;
            place-items: center;
        }
        .container{
            height: 400px;
            width: 500px;
            background-color: rgb(85, 125, 244);
            border-radius: 20px;
            box-shadow: 12px 12px 50px rgb(60, 87, 171);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .rules{
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            line-height: 50px;
            display: block;
        }

        button{
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background-color: rgb(141, 141, 8);
            box-shadow: 2px 2px 5px rgb(141, 141, 8);
            border-radius: 20px;
            border: none;
            cursor: pointer;    
        }
        
        .game{
            display: none;
            font-weight: bold;
            font-size: larger;
            text-align: center;
            line-height: 50px;
        }
        .game input{
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            box-shadow: 2px 2px 5px rgb(141, 141, 8);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="rules">GAME RULES:
            <p>Guess a random number between 1 and 100</p>
            <p>You have 10 attemps to guess the number</p>
            <button onclick="startGame()">START</button>
        </div>
        <div class="game">
            <p>Guess a Number between 1 and 100</p>
            <input type="number" id="guessInput" placeholder="Enter your guess">
            <button onclick="checkGuess()">Submit</button>
            <p id="previousGuess"></p>
            <p id="remainingGuess"></p>
        </div>
    </div>

    <script>
        function startGame() {
            document.querySelector('.rules').style.display = 'none';
            document.querySelector('.game').style.display = 'block';
        }

        let randomNumber = Math.floor(Math.random() * 100) + 1;
        let attempts = 10;

        function resetGame() {
            randomNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 10;
            document.getElementById('previousGuess').textContent = '';
            document.getElementById('remainingGuess').textContent = `Remaining Attempts: ${attempts}`;
        }

        function checkGuess() {
            const guessInput = document.getElementById('guessInput');
            const previousGuess = document.getElementById('previousGuess');
            const remainingGuess = document.getElementById('remainingGuess');

            let userGuess = parseInt(guessInput.value);
            if (isNaN(userGuess) || userGuess < 1 || userGuess > 100) {
                alert("Please enter a valid number between 1 and 100");
                return;
            }

            attempts--;
            previousGuess.textContent = `Previous Guess: ${userGuess}`;
            remainingGuess.textContent = `Remaining Attempts: ${attempts}`;

            if (userGuess === randomNumber) {
                alert("Congratulations! You've guessed the number!");
                resetGame();
            } else if (attempts === 0) {
                alert(`Game Over! The correct number was ${randomNumber}`);
                resetGame();
            } else if (userGuess < randomNumber) {
                alert("Too low! Try again.");
            } else {
                alert("Too high! Try again.");
            }

            guessInput.value = '';
        }


    </script>
</body>
</html>
