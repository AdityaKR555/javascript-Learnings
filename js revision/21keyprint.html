<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
    
        #insert {
            text-align: center;
        }
    
        .key {
            margin-top: 20px;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    
        table {
            width: 100%;
            border-collapse: collapse;
        }
    
        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
    
        th {
            background-color: #f9f9f9;
            border-radius: 5px;
        }
    </style>
  </head>
  <body>
    <div id="insert">
      <h2>Press any key to see it printed</h2>
    </div>

    <script>
      const insert = document.getElementById("insert");

      window.addEventListener("keydown", (e) => {
        insert.innerHTML = `
        <div class="key">
            <table>
                <tr>
                    <th>Key</th>    
                    <th>Keycode</th> 
                    <th>Code</th>
                </tr>
                <tr>
                    <td>${e.key === " " ? "Space" : e.key}</td>
                    <td>${e.keyCode}</td> 
                    <td>${e.code}</td>
                </tr>
            </table>
        </div>
        `;
        });
    </script>
  </body>
</html>
