<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body {
            background-color: rgb(1, 13, 49);
            width: 100%;
            overflow-x: hidden;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: red;
            /* overflow: hidden; */
            position: relative;
        }
        .navbar ul{
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .navbar ul li a {
            font-size: 18px;
            text-decoration: none;
            color: white;
        }

        .logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .hamburgar {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .hamburgar span {
            width: 25px;
            height: 3px;
            background-color: white;
            border-radius: 5px;
            transition: 0.3s;
        }

        .hamburgar.active span:first-child {
            transform: rotate(45deg) translate(5px, 6px);
            background-color: red;
        }

        .hamburgar.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburgar.active span:last-child {
            transform: rotate(-45deg) translate(5px, -6px);
            background-color: red;
        }

        @media (max-width: 768px) {
            .hamburgar {
                display: flex;
            }

            .nav-Links {
                display: flex;
                width: 100vw;
                height: 100vh;
                background-color: rgba(255, 228, 196, 0.603);
                backdrop-filter: blur(10px);
                position: fixed;
                top: 0;
                left: 0; 
                transform: translateX(100%); 
                flex-direction: column;
                gap: 27px;
                align-items: center;
                justify-content: center;
                transition: transform 0.3s ease;
            }

            .nav-Links.active {
               transform: translateX(0);
            }

            .navbar{
                position: sticky;
                top: 0;
                z-index: 1000;
                color: red;
            }

            .navbar.active{
                background-color: rgba(255, 228, 196, 0.603);
                backdrop-filter: blur(10px);
            }
        }

    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">MySite</div>
        <ul class="nav-Links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="hamburgar">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <script>
        const hamburgar = document.querySelector(".hamburgar");
        const navLinks = document.querySelector(".nav-Links");
        const navBar = document.querySelector(".navbar");

        hamburgar.addEventListener('click', () => {
            navLinks.classList.toggle("active");
            navBar.classList.toggle("active");
            hamburgar.classList.toggle("active");
        });
    </script>
</body>
</html>
