<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Mass Index Calculator</title>
    <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    form {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      width: 320px;
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #444;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 18px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: #6c63ff;
      outline: none;
    }

    button {
      background: #6c63ff;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.3s;
      width: 100%;
    }

    button:hover {
      background: #574b90;
    }

    #results {
      margin-top: 20px;
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
  </style>
</head>
<body>
    <form>
        <p><label for="height">Height (m):</label> <input type="number" id="height" name="height" required step="0.01"></p>
        <p><label for="weight">Weight (kg):</label> <input type="number" id="weight" name="weight" required step="0.1"></p>
        <button type="submit">Calculate BMI</button>
        <p id="results"></p>
    </form>

    <script>
        const form = document.querySelector('form');
        const results = document.getElementById('results');

        form.addEventListener('submit', (e) => {
            e.preventDefault(); // Prevent form from submitting and refreshing the page

            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);

            
            if (height < 0 || isNaN(height)) {
                results.innerHTML = `Please give a valid height ${height}`;
            } else if (weight < 0 || isNaN(weight)) {
                results.innerHTML = `Please give a valid weight ${weight}`;
            } else {
                const bmi = weight / (height * height);
                results.innerHTML = `Your BMI is ${bmi.toFixed(2)}`;
                if(bmi < 18.5){
                    results.innerHTML += `<br>You are underweight.`;
                } else if (bmi >= 18.5 && bmi < 25) {
                    results.innerHTML += `<br>You are normal weight.`;
                } else if (bmi >= 25 && bmi < 30) {
                    results.innerHTML += `<br>You are overweight.`;
                } else {
                    results.innerHTML += `<br>You are obese.`;
                }  
                
            }
        })
    </script>
</body>
</html>
