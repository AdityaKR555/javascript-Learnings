    <style>
        *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
        }

        body{
            width: 100%;
            min-height: 100vh;
            transition: 0.5s ease;
        }

        /* LIGHT MODE */
        body.light-mode{
            background: linear-gradient(135deg, #fdfcfb, #e2d1c3);
            color: #222;
        }

        /* DARK MODE */
        body.dark-mode{
            background: linear-gradient(135deg, #1f1c2c, #545161);
            color: #fff;
        }

        /* TOP SECTION */
        .topsec{
            width: 96%;
            margin: 1rem auto;
            padding: 1.5rem 2rem;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;

            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.2);
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        .topsec h2{
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        /* BUTTON ICON */
        #clrMode{
            border-radius: 50%;
            padding: 0.6rem;
            cursor: pointer;
            transition: 0.3s ease;
        }

        #clrMode:hover{
            transform: scale(1.2);
        }

        /* RESULT SECTION */
        .result{
            margin: auto;
            width: 60%;
            min-height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

        /* QUOTE BOX */
        .result div{
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.504), inset -10px -10px 30px rgba(255, 255, 255, 0.521);
        }

        .result h2{
            font-weight: 500;
            line-height: 1.5;
        }

        /* BUTTON */
        #getQuotes{
            padding: 1rem 2rem;
            border-radius: 2rem;
            border: none;
            font-weight: 600;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.3s;
            /* box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.504), inset -10px -10px 30px rgba(255, 255, 255, 0.521); */
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #222;
        }

        #getQuotes:hover{
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="topsec">
        <h2>Get Random Quotes</h2>
        <div class="light" id="clrMode">
            <span class="material-symbols-outlined">dark_mode</span>
        </div>
    </div>
    <div class="result">
        <button id="getQuotes">Get Your Quote of the day</button>
        <div></div>
    </div>
    <script>
        const quoteArray = ['“Strength is born from perseverance and resilience.”',
                            '“Believe in your potential; it’s limitless.”',
                            '“Courage is the catalyst for change.”',
                            '“Small victories lead to monumental achievements.”',
                            '“Push through the discomfort; greatness awaits.”',
                            '“Focus on progress, not perfection.”',
                            '“Every setback is a setup for a comeback.”',
                            '“Your mindset shapes your destiny.”',
                            '“In every challenge lies an opportunity.”',
                            '“Stay hungry for growth and knowledge.”',
                            '“Success is a series of small efforts, repeated.”'
                            ];

        const hindiQuoteArray = ["शक्ति धैर्य और दृढ़ता से जन्म लेती है।",
                                "अपने सामर्थ्य पर विश्वास करो; यह असीमित है।",
                                "साहस परिवर्तन का प्रेरक तत्व है।",
                                "छोटी-छोटी जीतें ही महान उपलब्धियों का मार्ग बनाती हैं।",
                                "असुविधा को सहो; महानता तुम्हारी प्रतीक्षा कर रही है।",
                                "पूर्णता नहीं, प्रगति पर ध्यान केंद्रित करो।",
                                "हर असफलता, वापसी की एक नई शुरुआत होती है।",
                                "तुम्हारी सोच ही तुम्हारा भविष्य निर्धारित करती है।",
                                "हर चुनौती में एक अवसर छिपा होता है।",
                                "विकास और ज्ञान के लिए सदैव उत्सुक रहो।",
                                "सफलता छोटे-छोटे प्रयासों की निरंतर पुनरावृत्ति है।"
                                ];

        const quoteBtn = document.getElementById('getQuotes');
        const clrMode = document.getElementById('clrMode');
        const quote = document.querySelector('.result div');

        quoteBtn.addEventListener('click', () => {
            let index = Math.floor(Math.random()*quoteArray.length);
            // console.log(quoteArray[index]);
            // console.log(hindiQuoteArray[index]);
            quote.innerHTML = `<h2>${quoteArray[index]}</h2> <br> <h2>${hindiQuoteArray[index]}</h2>`
        })

        document.body.classList.add('light-mode');

        // clrMode.addEventListener('click', () => {
        //     document.body.classList.toggle('dark-mode');
        //     document.body.classList.toggle('light-mode');
        //     if(document.body.classList.contains('dark-mode')){
        //         clrMode.innerHTML = `<span class="material-symbols-outlined">light_mode</span>`;
        //     } else {
        //         clrMode.innerHTML = `<span class="material-symbols-outlined">dark_mode</span>`;
        //     }
        // });

        const icon = clrMode.querySelector('span');

        clrMode.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode');

            if(document.body.classList.contains('dark-mode')){
                icon.textContent = 'light_mode';
            } else {
                icon.textContent = 'dark_mode';
            }
        });
    </script>
</body>
